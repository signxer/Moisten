<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>润物细无声 - 下载</title>
    <link rel="icon" href="icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 520px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
        }
        .icon {
            width: 96px;
            height: 96px;
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
        }
        .version {
            display: inline-block;
            background: rgba(137,180,250,0.15);
            color: #89b4fa;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .cards { display: flex; flex-direction: column; gap: 12px; }
        .card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            padding: 16px 20px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .card:hover {
            background: #22223a;
            border-color: #89b4fa;
            transform: translateY(-2px);
        }
        .card-icon {
            font-size: 28px;
            width: 48px;
            text-align: center;
        }
        .card-info { flex: 1; text-align: left; }
        .card-title { font-size: 16px; font-weight: 600; color: #fff; }
        .card-desc { font-size: 13px; color: #888; margin-top: 2px; }
        .card-size {
            font-size: 12px;
            color: #666;
            background: #1a1a2e;
            padding: 4px 10px;
            border-radius: 6px;
        }
        .footer {
            margin-top: 48px;
            color: #555;
            font-size: 12px;
        }
        .loading { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <img src="icon.png" alt="icon" class="icon">
        <h1>润物细无声</h1>
        <p class="subtitle">随风潜入夜，润物细无声</p>
        <div class="version" id="version">加载中...</div>
        <div class="cards" id="downloads">
            <p class="loading">正在获取下载链接...</p>
        </div>
        <div class="footer">首次运行需安装运行环境，详见项目文档</div>
    </div>
    <script>
        const REPO = 'signxer/Moisten';
        async function load() {
            try {
                const res = await fetch('releases.json');
                if (!res.ok) throw new Error('No releases');
                const data = await res.json();
                document.getElementById('version').textContent = data.tag;
                const box = document.getElementById('downloads');
                box.innerHTML = '';
                const icons = { 'Windows': '🪟', 'macOS': '🍎' };
                for (const a of data.assets) {
                    if (a.size === 0) continue;
                    const icon = icons[a.name] || '📦';
                    const desc = a.name === 'Windows' ? 'Windows 10/11 (64-bit)' : 'macOS 12+ (Intel/Apple Silicon)';
                    const size = (a.size / 1024 / 1024).toFixed(1) + ' MB';
                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = `https://github.com/${REPO}/releases/download/${data.tag}/${a.file}`;
                    card.innerHTML = `
                        <div class="card-icon">${icon}</div>
                        <div class="card-info">
                            <div class="card-title">${a.name}</div>
                            <div class="card-desc">${desc}</div>
                        </div>
                        <div class="card-size">${size}</div>
                    `;
                    box.appendChild(card);
                }
            } catch(e) {
                document.getElementById('downloads').innerHTML = '<p style="color:#f38ba8">暂无可用版本</p>';
                document.getElementById('version').textContent = '';
            }
        }
        load();
    </script>
</body>
</html>
