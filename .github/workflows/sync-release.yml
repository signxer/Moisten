name: Sync Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.1)'
        required: true
      windows_url:
        description: 'Windows EXE download URL'
        required: false
      macos_url:
        description: 'macOS DMG download URL'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download assets
        run: |
          mkdir -p assets
          if [ -n "${{ inputs.windows_url }}" ]; then
            curl -L -o "assets/CCBU-Auto-${{ inputs.tag }}-Windows.exe" "${{ inputs.windows_url }}"
          fi
          if [ -n "${{ inputs.macos_url }}" ]; then
            curl -L -o "assets/CCBU-Auto-${{ inputs.tag }}-macOS.dmg" "${{ inputs.macos_url }}"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "润物细无声 ${{ inputs.tag }}"
          generate_release_notes: true
          files: assets/*

      - name: Generate releases.json
        run: |
          TAG="${{ inputs.tag }}"
          WIN_SIZE=$(stat -c%s assets/CCBU-Auto-*-Windows.exe 2>/dev/null || echo "0")
          MAC_SIZE=$(stat -c%s assets/CCBU-Auto-*-macOS.dmg 2>/dev/null || echo "0")
          cat > releases.json << EOF
          {
            "tag": "${TAG}",
            "assets": [
              {"name": "Windows", "file": "CCBU-Auto-${TAG}-Windows.exe", "size": ${WIN_SIZE}},
              {"name": "macOS", "file": "CCBU-Auto-${TAG}-macOS.dmg", "size": ${MAC_SIZE}}
            ]
          }
          EOF

      - name: Commit releases.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add releases.json
          git diff --cached --quiet || git commit -m "update releases.json for ${{ inputs.tag }}"
          git push
